<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#44C8E8" />
    <!-- Title, description, canonical, and Open Graph tags are managed per-route
         by React 19 (src/components/Seo/Seo.jsx) — the single source of truth. No
         static <title>/<meta description> here on purpose: React 19 hoists its own
         and would leave a duplicate that the browser resolves to the FIRST (static)
         one, defeating per-route titles. (Prerendering, the Track A follow-up, will
         bake the real per-route tags into static HTML for crawlers that don't run JS.) -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <noscript>Pulsar Patch needs JavaScript enabled to shop. Please turn it on, or visit us in store.</noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
